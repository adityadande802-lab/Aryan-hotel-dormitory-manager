<!DOCTYPE html>
<html>
<head>
<title>Aryan Dormitory Manager</title>

<style>
body { font-family: Arial; background:#f5f7fa; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
input, select { margin:5px; padding:6px; }
button { padding:6px 10px; margin:5px; cursor:pointer; }
.dashboard { display:flex; gap:20px; }
.box { padding:10px; background:#fff; border-radius:10px; }
</style>
</head>

<body>

<h2>🏨 Aryan Dormitory Manager</h2>

<div class="dashboard">
<div class="box">Revenue: ₹<span id="rev">0</span></div>
<div class="box">Pending: ₹<span id="pend">0</span></div>
<div class="box">Guests: <span id="count">0</span></div>
</div>

<div class="card">

<select id="room"></select>
<select id="bed"></select>

<input id="name" placeholder="Guest Name">
<input id="days" type="number" placeholder="Days">
<input id="price" type="number" placeholder="Bed Price">
<input id="advance" type="number" placeholder="Advance">

<button onclick="openFood()">🍽️ Food</button>

<select id="payment">
<option>Pending</option>
<option>Paid</option>
</select>

<button onclick="saveBooking()">Save</button>

</div>

<div class="card">
<table border="1" width="100%">
<tr>
<th>Name</th><th>Room</th><th>Bed</th>
<th>Total</th><th>Status</th><th>Actions</th>
</tr>
<tbody id="table"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCpJ5HP-qFwibkXs6vk-B7ewTesh8KTjCE",
  authDomain: "aryan-dormitory-manager.firebaseapp.com",
  projectId: "aryan-dormitory-manager",
  storageBucket: "aryan-dormitory-manager.firebasestorage.app",
  messagingSenderId: "875819401826",
  appId: "1:875819401826:web:98cb2ccb87352831d4073b",
  measurementId: "G-G31YZ45JZB"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore();

const rooms={
  "अभिज्ञान‍ः":4,"व्यासः":4,"अत्रिः":4,"भृगुः":4,
  "वसिष्ठंः":12,"विश्वामित्रः":12,
  "भारद्वाजः":12,"भार्गवः":12,"आगतस्यः":12
};

for(let r in rooms){
  let o=document.createElement("option");
  o.value=r;o.innerText=r;
  room.appendChild(o);
}

room.onchange=loadBeds;

async function loadBeds(){
  bed.innerHTML="";
  let data=await getDocs(collection(db,"bookings"));
  let booked=[];
  data.forEach(d=>booked.push(d.data().room+"-"+d.data().bed));

  for(let i=1;i<=rooms[room.value];i++){
    let key=room.value+"-"+i;
    if(!booked.includes(key)){
      let o=document.createElement("option");
      o.value=i;o.innerText="Bed "+i+" 🟢";
      bed.appendChild(o);
    }
  }
}
loadBeds();

let foodItems=[];
window.openFood=()=>{
  let n=prompt("Food");
  let p=Number(prompt("Price"));
  if(n&&p)foodItems.push({name:n,price:p});
};

let editId=null;

window.saveBooking=async()=>{

let daysVal=Number(days.value);
let priceVal=Number(price.value);
let foodTotal=foodItems.reduce((s,f)=>s+f.price,0);
let total=(daysVal*priceVal)+foodTotal;

if(editId){
await updateDoc(doc(db,"bookings",editId),{
name:name.value,room:room.value,bed:bed.value,
total,status:payment.value,food:foodItems
});
editId=null;
}else{
await addDoc(collection(db,"bookings"),{
name:name.value,room:room.value,bed:bed.value,
total,status:payment.value,food:foodItems
});
}

foodItems=[];
loadData();
loadBeds();
};

window.editBooking=async(id)=>{
editId=id;
let snap=await getDoc(doc(db,"bookings",id));
let b=snap.data();
name.value=b.name;
room.value=b.room;
await loadBeds();
bed.value=b.bed;
payment.value=b.status;
foodItems=b.food||[];
};

window.deleteBooking=async(id)=>{
await deleteDoc(doc(db,"bookings",id));
loadData();loadBeds();
};

window.checkout=async(id)=>{
await updateDoc(doc(db,"bookings",id),{status:"CheckedOut"});
loadData();loadBeds();
};

window.invoice=(b)=>{
let msg=`Invoice\n${b.name}\n${b.room} Bed ${b.bed}\nTotal ₹${b.total}`;
window.open("https://wa.me/?text="+encodeURIComponent(msg));
};

async function loadData(){
let data=await getDocs(collection(db,"bookings"));
table.innerHTML="";
let rev=0,pend=0,count=0;

data.forEach(d=>{
let b=d.data();
rev+=b.total;
if(b.status!="Paid")pend+=b.total;
count++;

table.innerHTML+=`
<tr>
<td>${b.name}</td>
<td>${b.room}</td>
<td>${b.bed}</td>
<td>₹${b.total}</td>
<td>${b.status}</td>
<td>
<button onclick='editBooking("${d.id}")'>Edit</button>
<button onclick='deleteBooking("${d.id}")'>Delete</button>
<button onclick='checkout("${d.id}")'>Checkout</button>
<button onclick='invoice(${JSON.stringify(b)})'>WhatsApp</button>
</td>
</tr>`;
});

revEl.innerText=rev;
pendEl.innerText=pend;
countEl.innerText=count;
}

const revEl=document.getElementById("rev");
const pendEl=document.getElementById("pend");
const countEl=document.getElementById("count");

loadData();

</script>

</body>
</html>
