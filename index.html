<!DOCTYPE html>
<html>
<head>
<title>Aryan Dormitory Manager</title>

<style>
body { font-family: Arial; background:#f5f7fa; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
input, select { margin:5px; padding:6px; }
button { padding:6px 10px; margin:5px; }
</style>
</head>

<body>

<h2>🏨 Aryan Dormitory Manager</h2>

<div class="card">
<h3>Add / Edit Booking</h3>

<select id="room"></select>
<select id="bed"></select>

<input id="name" placeholder="Guest Name">
<input id="days" type="number" placeholder="Days">
<input id="price" type="number" placeholder="Bed Price">

<button onclick="openFood()">🍽️ Add Food</button>

<select id="payment">
<option>Pending</option>
<option>Paid</option>
</select>

<button onclick="saveBooking()">Save Booking</button>
</div>

<div class="card">
<h3>Bookings</h3>
<table border="1" width="100%">
<tr>
<th>Name</th><th>Room</th><th>Bed</th>
<th>Total</th><th>Status</th><th>Actions</th>
</tr>
<tbody id="table"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpJ5HP-qFwibkXs6vk-B7ewTesh8KTjCE",
  authDomain: "aryan-dormitory-manager.firebaseapp.com",
  projectId: "aryan-dormitory-manager"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

// ROOMS
const rooms = {
  "अभिज्ञान‍ः":4,"व्यासः":4,"अत्रिः":4,"भृगुः":4,
  "वसिष्ठंः":12,"विश्वामित्रः":12,
  "भारद्वाजः":12,"भार्गवः":12,"आगतस्यः":12
};

const roomSelect = document.getElementById("room");

for (let r in rooms){
  let opt = document.createElement("option");
  opt.value = r;
  opt.innerText = r;
  roomSelect.appendChild(opt);
}

roomSelect.onchange = loadBeds;

async function loadBeds(){
  let bedSelect = document.getElementById("bed");
  bedSelect.innerHTML="";

  let count = rooms[roomSelect.value];

  for(let i=1;i<=count;i++){
    let opt = document.createElement("option");
    opt.value = i;
    opt.innerText = "Bed "+i;
    bedSelect.appendChild(opt);
  }
}
loadBeds();

// FOOD
let foodItems=[];

window.openFood = () => {
  let name = prompt("Food Item");
  let price = Number(prompt("Price"));

  if(name && price){
    foodItems.push({name,price});
  }
};

// EDIT
let editId=null;

window.editBooking = async (id) => {

  editId = id;

  const docSnap = await getDoc(doc(db,"bookings",id));

  if(docSnap.exists()){
    let b = docSnap.data();

    document.getElementById("name").value = b.name;
    document.getElementById("room").value = b.room;

    await loadBeds(); // important

    document.getElementById("bed").value = b.bed;
    document.getElementById("payment").value = b.status;

    foodItems = b.food || [];
  }
};

// SAVE
window.saveBooking = async () => {

  let total = 100; // simple test value

  if(editId){

    await updateDoc(doc(db,"bookings",editId),{
      name: document.getElementById("name").value,
      room: document.getElementById("room").value,
      bed: document.getElementById("bed").value,
      total,
      status: document.getElementById("payment").value,
      food: foodItems
    });

    alert("Updated successfully");

    editId = null;

  }else{

    await addDoc(collection(db,"bookings"),{
      name: document.getElementById("name").value,
      room: document.getElementById("room").value,
      bed: document.getElementById("bed").value,
      total,
      status: document.getElementById("payment").value,
      food: foodItems
    });

    alert("Saved successfully");
  }

  loadData();
};

// LOAD
async function loadData(){
  let data = await getDocs(collection(db,"bookings"));
  table.innerHTML="";

  data.forEach(d=>{
    let b = d.data();

    table.innerHTML+=`
<tr>
<td>${b.name}</td>
<td>${b.room}</td>
<td>${b.bed}</td>
<td>${b.total}</td>
<td>${b.status}</td>
<td>
<button onclick='editBooking("${d.id}")'>Edit</button>
<button onclick='showInvoice(${JSON.stringify(b)})'>Invoice</button>
</td>
</tr>`;
  });
}

loadData();
window.showInvoice = (b) => {

  let foodList = (b.food || []).map(f => f.name + " ₹" + f.price).join("\n");

  alert(`🧾 INVOICE

Guest: ${b.name}
Room: ${b.room}
Bed: ${b.bed}

Food:
${foodList || "No food"}

Total: ₹${b.total}
Status: ${b.status}`);
};
</script>

</body>
</html>
