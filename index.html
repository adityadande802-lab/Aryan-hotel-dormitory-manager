<!DOCTYPE html>
<html>
<head>
<title>Aryan Dormitory Manager</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
body { font-family: Arial; background:#f5f7fa; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
input, select { margin:5px; padding:6px; }
button { padding:6px 10px; margin:5px; cursor:pointer; }

.dashboard { display:flex; gap:20px; margin-bottom:20px; }
.box { padding:10px; background:#fff; border-radius:10px; }

.bed {
  display:inline-block;
  padding:8px 12px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
}

.available { background:#28a745; color:white; }
.booked { background:#dc3545; color:white; }
.selected { background:#007bff; color:white; }

#calendar {
  background: white;
  padding: 10px;
  border-radius: 10px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>🏨 Aryan Dormitory Manager</h2>

<button onclick="login()">Login</button>
<p id="userStatus">Not logged in</p>

<div class="dashboard">
<div class="box">Revenue: ₹<span id="rev">0</span></div>
<div class="box">Pending: ₹<span id="pend">0</span></div>
<div class="box">Guests: <span id="count">0</span></div>
</div>

<div class="card">
<h3>📅 Booking Calendar</h3>
<div id="calendar"></div>
</div>

<div class="card">

<select id="room"></select>
<select id="bed"></select>

<input id="name" placeholder="Guest Name">
<input type="date" id="checkin">
<input type="date" id="checkout">
<input id="price" type="number" placeholder="Bed Price">

<p id="daysDisplay"></p>

<button onclick="openFood()">🍽️ Food</button>

<select id="payment">
<option>Pending</option>
<option>Paid</option>
</select>

<button onclick="saveBooking()">Save</button>

</div>

<div class="card">
<h3>Bed Layout</h3>
<div id="bedLayout"></div>
</div>

<div class="card">
<table border="1" width="100%">
<tr>
<th>Name</th><th>Room</th><th>Bed</th>
<th>Check-in</th><th>Check-out</th>
<th>Total</th><th>Status</th><th>Actions</th>
</tr>
<tbody id="table"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpJ5HP-qFwibkXs6vk-B7ewTesh8KTjCE",
  authDomain: "aryan-dormitory-manager.firebaseapp.com",
  projectId: "aryan-dormitory-manager",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();
const auth = getAuth();

let currentUser = null;

// LOGIN
window.login = async ()=>{
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth,(user)=>{
  if(user){
    currentUser = user;
    userStatus.innerText = "Logged in: " + user.email;
  }else{
    currentUser = null;
    userStatus.innerText = "Not logged in";
  }
});

// DAYS CALC
function calculateDays(){
  let inDate = new Date(checkin.value);
  let outDate = new Date(checkout.value);

  if(inDate && outDate && outDate > inDate){
    let diff = (outDate - inDate)/(1000*60*60*24);
    daysDisplay.innerText = "Days: " + diff;
    return diff;
  } else {
    daysDisplay.innerText = "";
    return 0;
  }
}

checkin.onchange = calculateDays;
checkout.onchange = calculateDays;

// ROOMS
const rooms={
  "अभिज्ञान‍ः":4,"व्यासः":4,"अत्रिः":4,"भृगुः":4,
  "वसिष्ठंः":12,"विश्वामित्रः":12,
  "भारद्वाजः":12,"भार्गवः":12,"आगतस्यः":12
};

for(let r in rooms){
  let o=document.createElement("option");
  o.value=r;o.innerText=r;
  room.appendChild(o);
}

room.onchange=loadBeds;

async function loadBeds(){
  bed.innerHTML="";
  let data=await getDocs(collection(db,"bookings"));
  let booked=[];
  data.forEach(d=>booked.push(d.data().room+"-"+d.data().bed));

  for(let i=1;i<=rooms[room.value];i++){
    let key=room.value+"-"+i;
    if(!booked.includes(key)){
      let o=document.createElement("option");
      o.value=i;o.innerText="Bed "+i;
      bed.appendChild(o);
    }
  }
}
loadBeds();

// FOOD
let foodItems=[];
window.openFood=()=>{
  let n=prompt("Food item");
  let p=Number(prompt("Price"));
  if(n&&p)foodItems.push({name:n,price:p});
};

// EDIT
let editId=null;

window.editBooking=async(id)=>{
  editId=id;
  let snap=await getDoc(doc(db,"bookings",id));
  let b=snap.data();

  name.value=b.name;
  room.value=b.room;
  await loadBeds();
  bed.value=b.bed;
  payment.value=b.status;
  foodItems=b.food||[];

  checkin.value = b.checkin || "";
  checkout.value = b.checkout || "";
  calculateDays();
};

// SAVE
window.saveBooking = async () => {

  if(!currentUser){
    alert("Login first ❗");
    return;
  }

  let daysVal = calculateDays();
  let total = (daysVal * (Number(price.value)||0)) +
              foodItems.reduce((s,f)=>s+f.price,0);

  let dataObj = {
    name: name.value || "No Name",
    room: room.value,
    bed: bed.value,
    checkin: checkin.value,
    checkout: checkout.value,
    total,
    status: payment.value,
    food: foodItems
  };

  if(editId){
    await updateDoc(doc(db,"bookings",editId), dataObj);
    editId=null;
  }else{
    await addDoc(collection(db,"bookings"), dataObj);
  }

  alert("Saved ✅");

  foodItems=[];
  loadData();
  loadBeds();
  renderBeds();
  loadCalendar();
};

// DELETE
window.deleteBooking=async(id)=>{
  await deleteDoc(doc(db,"bookings",id));
  loadData(); loadBeds(); renderBeds(); loadCalendar();
};

// CHECKOUT
window.checkout=async(id)=>{
  await updateDoc(doc(db,"bookings",id),{status:"CheckedOut"});
  loadData(); loadBeds(); renderBeds(); loadCalendar();
};

// CALENDAR
let calendar;

async function loadCalendar(){
  let data=await getDocs(collection(db,"bookings"));
  let events=[];

  data.forEach(d=>{
    let b=d.data();
    if(b.checkin && b.checkout){
      events.push({
        title:b.name,
        start:b.checkin,
        end:b.checkout
      });
    }
  });

  let el=document.getElementById("calendar");
  if(calendar) calendar.destroy();

  calendar=new FullCalendar.Calendar(el,{
    initialView:'dayGridMonth',
    height:500,
    events
  });

  calendar.render();
}

// TABLE
async function loadData(){
  let data=await getDocs(collection(db,"bookings"));
  table.innerHTML="";

  data.forEach(d=>{
    let b=d.data();

    table.innerHTML+=`
<tr>
<td>${b.name}</td>
<td>${b.room}</td>
<td>${b.bed}</td>
<td>${b.checkin||""}</td>
<td>${b.checkout||""}</td>
<td>₹${b.total}</td>
<td>${b.status}</td>
<td>
<button onclick='editBooking("${d.id}")'>Edit</button>
<button onclick='deleteBooking("${d.id}")'>Delete</button>
<button onclick='checkout("${d.id}")'>Checkout</button>
</td>
</tr>`;
  });
}

// BED UI
async function renderBeds(){
  let container=bedLayout;
  container.innerHTML="";

  let data=await getDocs(collection(db,"bookings"));
  let booked=[];
  data.forEach(d=>{
    let b=d.data();
    booked.push(b.room+"-"+b.bed);
  });

  for(let roomName in rooms){
    let div=document.createElement("div");
    div.innerHTML=`<h4>${roomName}</h4>`;

    for(let i=1;i<=rooms[roomName];i++){
      let span=document.createElement("span");
      span.className="bed";

      let key=roomName+"-"+i;

      if(booked.includes(key)){
        span.classList.add("booked");
      }else{
        span.classList.add("available");
        span.onclick=()=>{
          room.value=roomName;
          bed.value=i;
        };
      }

      span.innerText="Bed "+i;
      div.appendChild(span);
    }

    container.appendChild(div);
  }
}

// INIT
loadData();
renderBeds();
loadCalendar();

</script>

</body>
</html>
