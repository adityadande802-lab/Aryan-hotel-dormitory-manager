<!DOCTYPE html>
<html>
<head>
<title>Aryan Dormitory Manager</title>

<style>
body { font-family: Arial; background:#f5f7fa; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
input, select { margin:5px; padding:6px; }
button { padding:6px 10px; margin:5px; }
</style>

</head>

<body>

<h2>🏨 Aryan Dormitory Manager</h2>
<p id="userInfo"></p>
<button onclick="login()">Login</button>

<div class="card">
<h3>Add / Edit Booking</h3>

<select id="room"></select>
<select id="bed"></select>

<input id="name" placeholder="Guest Name">
<input id="days" type="number" placeholder="Days">
<input id="price" type="number" placeholder="Bed Price">

<h4>Food Items</h4>
<input id="foodName" placeholder="Item">
<input id="foodPrice" type="number" placeholder="Price">
<button onclick="addFood()">Add Food</button>

<ul id="foodList"></ul>

<input id="advance" type="number" placeholder="Advance">

<select id="payment">
<option>Pending</option>
<option>Paid</option>
</select>

<button onclick="saveBooking()">Save Booking</button>
</div>

<div class="card">
<h3>Bookings</h3>
<table border="1" width="100%">
<tr>
<th>Name</th><th>Room</th><th>Bed</th>
<th>Total</th><th>Status</th><th>Actions</th>
</tr>
<tbody id="table"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpJ5HP-qFwibkXs6vk-B7ewTesh8KTjCE",
  authDomain: "aryan-dormitory-manager.firebaseapp.com",
  projectId: "aryan-dormitory-manager"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

window.login = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

// ROOMS
const rooms = {
  "अभिज्ञान‍ः":4,
  "व्यासः":4,
  "अत्रिः":4,
  "भृगुः":4,
  "वसिष्ठंः":12,
  "विश्वामित्रः":12,
  "भारद्वाजः":12,
  "भार्गवः":12,
  "आगतस्यः":12
};

const roomSelect = document.getElementById("room");

for (let r in rooms){
  let opt = document.createElement("option");
  opt.value = r;
  opt.innerText = r;
  roomSelect.appendChild(opt);
}

roomSelect.onchange = loadBeds;

async function loadBeds(){
  let bedSelect = document.getElementById("bed");
  bedSelect.innerHTML="";

  let data = await getDocs(collection(db,"bookings"));
  let booked=[];

  data.forEach(d=>{
    let b=d.data();
    booked.push(b.room+"-"+b.bed);
  });

  let count = rooms[roomSelect.value];

  for(let i=1;i<=count;i++){
    let key = roomSelect.value+"-"+i;

    if(!booked.includes(key)){
      let opt = document.createElement("option");
      opt.value = i;
      opt.innerText = "Bed "+i+" 🟢";
      bedSelect.appendChild(opt);
    }
  }
}
loadBeds();

// FOOD
let foodItems=[];
window.addFood = () => {
  let name = foodName.value;
  let price = Number(foodPrice.value);

  foodItems.push({name,price});

  let li=document.createElement("li");
  li.innerText=name+" ₹"+price;
  foodList.appendChild(li);
};

// EDIT SYSTEM
let editId=null;

window.editBooking = async (id) => {

  editId=id;

  let data=await getDocs(collection(db,"bookings"));

  data.forEach(d=>{
    if(d.id===id){
      let b=d.data();

      name.value=b.name;
      room.value=b.room;
      payment.value=b.status;

      foodItems=b.food||[];
      foodList.innerHTML="";
      foodItems.forEach(f=>{
        let li=document.createElement("li");
        li.innerText=f.name+" ₹"+f.price;
        foodList.appendChild(li);
      });
    }
  });
};

// SAVE / UPDATE
window.saveBooking = async () => {

  let foodTotal=foodItems.reduce((s,f)=>s+f.price,0);
  let total=(Number(days.value)*Number(price.value))+foodTotal;

  if(editId){

    await updateDoc(doc(db,"bookings",editId),{
      name:name.value,
      room:room.value,
      bed:bed.value,
      total,
      status:payment.value,
      food:foodItems
    });

    editId=null;

  }else{

    await addDoc(collection(db,"bookings"),{
      name:name.value,
      room:room.value,
      bed:bed.value,
      total,
      status:payment.value,
      food:foodItems
    });

  }

  foodItems=[];
  foodList.innerHTML="";

  loadData();
  loadBeds();
};

// INVOICE
window.showInvoice = (b) => {

  let foodList = (b.food||[]).map(f=>f.name+" ₹"+f.price).join("\n");

  alert(`INVOICE

Name: ${b.name}
Room: ${b.room}
Bed: ${b.bed}

Food:
${foodList}

Total: ₹${b.total}
Status: ${b.status}`);
};

// LOAD DATA
async function loadData(){
  let data=await getDocs(collection(db,"bookings"));
  table.innerHTML="";

  data.forEach(d=>{
    let b=d.data();

    table.innerHTML+=`
<tr>
<td>${b.name}</td>
<td>${b.room}</td>
<td>${b.bed}</td>
<td>₹${b.total}</td>
<td>${b.status}</td>
<td>
<button onclick='showInvoice(${JSON.stringify(b)})'>View</button>
<button onclick='editBooking("${d.id}")'>Edit</button>
</td>
</tr>`;
  });
}

loadData();

</script>

</body>
</html>
