<!DOCTYPE html>
<html>
<head>
<title>Aryan Dormitory Manager</title>

<style>
body { font-family: Arial; background:#f5f7fa; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
input, select { margin:5px; padding:6px; }
button { padding:6px 10px; margin:5px; cursor:pointer; }
.dashboard { display:flex; gap:20px; margin-bottom:20px; }
.box { padding:10px; background:#fff; border-radius:10px; }
</style>
</head>

<body>

<h2>🏨 Aryan Dormitory Manager</h2>

<div class="dashboard">
<div class="box">Revenue: ₹<span id="rev">0</span></div>
<div class="box">Pending: ₹<span id="pend">0</span></div>
<div class="box">Guests: <span id="count">0</span></div>
</div>

<div class="card">

<select id="room"></select>
<select id="bed"></select>

<input id="name" placeholder="Guest Name">
<input id="days" type="number" placeholder="Days">
<input id="price" type="number" placeholder="Bed Price">
<input id="advance" type="number" placeholder="Advance">

<button onclick="openFood()">🍽️ Food</button>

<select id="payment">
<option>Pending</option>
<option>Paid</option>
</select>

<button onclick="saveBooking()">Save</button>

</div>

<div class="card">
<table border="1" width="100%">
<tr>
<th>Name</th><th>Room</th><th>Bed</th>
<th>Total</th><th>Status</th><th>Actions</th>
</tr>
<tbody id="table"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpJ5HP-qFwibkXs6vk-B7ewTesh8KTjCE",
  authDomain: "aryan-dormitory-manager.firebaseapp.com",
  projectId: "aryan-dormitory-manager",
  storageBucket: "aryan-dormitory-manager.appspot.com",
  messagingSenderId: "875819401826",
  appId: "1:875819401826:web:98cb2ccb87352831d4073b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();

// ROOMS
const rooms={
  "अभिज्ञान‍ः":4,"व्यासः":4,"अत्रिः":4,"भृगुः":4,
  "वसिष्ठंः":12,"विश्वामित्रः":12,
  "भारद्वाजः":12,"भार्गवः":12,"आगतस्यः":12
};

// LOAD ROOMS
const roomSelect=document.getElementById("room");
const bedSelect=document.getElementById("bed");

for(let r in rooms){
  let o=document.createElement("option");
  o.value=r;o.innerText=r;
  roomSelect.appendChild(o);
}

roomSelect.onchange=loadBeds;

async function loadBeds(){
  bedSelect.innerHTML="";

  let data=await getDocs(collection(db,"bookings"));
  let booked=[];
  data.forEach(d=>booked.push(d.data().room+"-"+d.data().bed));

  for(let i=1;i<=rooms[roomSelect.value];i++){
    let key=roomSelect.value+"-"+i;

    if(!booked.includes(key)){
      let o=document.createElement("option");
      o.value=i;
      o.innerText="Bed "+i+" 🟢";
      bedSelect.appendChild(o);
    }
  }
}
loadBeds();

// FOOD
let foodItems=[];

window.openFood=()=>{
  let name=prompt("Food item");
  let price=Number(prompt("Price"));
  if(name && price){
    foodItems.push({name,price});
  }
};

// EDIT
let editId=null;

window.editBooking=async(id)=>{
  editId=id;

  const snap=await getDoc(doc(db,"bookings",id));
  let b=snap.data();

  document.getElementById("name").value=b.name;
  roomSelect.value=b.room;

  await loadBeds();
  bedSelect.value=b.bed;

  document.getElementById("payment").value=b.status;
  foodItems=b.food||[];
};

// SAVE
window.saveBooking=async()=>{

  let daysVal=Number(document.getElementById("days").value);
  let priceVal=Number(document.getElementById("price").value);

  let foodTotal=foodItems.reduce((s,f)=>s+f.price,0);
  let total=(daysVal*priceVal)+foodTotal;

  if(editId){

    await updateDoc(doc(db,"bookings",editId),{
      name:document.getElementById("name").value,
      room:roomSelect.value,
      bed:bedSelect.value,
      total,
      status:document.getElementById("payment").value,
      food:foodItems
    });

    editId=null;

  }else{

    await addDoc(collection(db,"bookings"),{
      name:document.getElementById("name").value,
      room:roomSelect.value,
      bed:bedSelect.value,
      total,
      status:document.getElementById("payment").value,
      food:foodItems
    });

  }

  foodItems=[];
  loadData();
  loadBeds();
};

// DELETE
window.deleteBooking=async(id)=>{
  await deleteDoc(doc(db,"bookings",id));
  loadData(); loadBeds();
};

// CHECKOUT
window.checkout=async(id)=>{
  await updateDoc(doc(db,"bookings",id),{status:"CheckedOut"});
  loadData(); loadBeds();
};

// INVOICE
window.invoice=(b)=>{
  let food=(b.food||[]).map(f=>f.name+" ₹"+f.price).join("\n");

  alert(`🧾 Invoice

${b.name}
${b.room} Bed ${b.bed}

Food:
${food || "None"}

Total: ₹${b.total}
Status: ${b.status}`);
};

// LOAD TABLE
async function loadData(){
  let data=await getDocs(collection(db,"bookings"));
  table.innerHTML="";

  let rev=0,pend=0,count=0;

  data.forEach(d=>{
    let b=d.data();

    rev+=b.total;
    if(b.status!="Paid") pend+=b.total;
    count++;

    table.innerHTML+=`
<tr>
<td>${b.name}</td>
<td>${b.room}</td>
<td>${b.bed}</td>
<td>₹${b.total}</td>
<td>${b.status}</td>
<td>
<button onclick='editBooking("${d.id}")'>Edit</button>
<button onclick='deleteBooking("${d.id}")'>Delete</button>
<button onclick='checkout("${d.id}")'>Checkout</button>
<button onclick='invoice(${JSON.stringify(b)})'>Invoice</button>
</td>
</tr>`;
  });

  document.getElementById("rev").innerText=rev;
  document.getElementById("pend").innerText=pend;
  document.getElementById("count").innerText=count;
}

loadData();

</script>

</body>
</html>
