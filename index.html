<!DOCTYPE html>
<html>
<head>
<title>Aryan Dormitory Manager</title>

<style
 .bed {
  display:inline-block;
  padding:8px 12px;
  margin:5px;
  border-radius:6px;
  cursor:pointer;
}

.available { background:#28a745; color:white; }
.booked { background:#dc3545; color:white; }
.selected { background:#007bff; color:white; }
  
body { font-family: Arial; background:#f5f7fa; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
input, select { margin:5px; padding:6px; }
button { padding:6px 10px; margin:5px; cursor:pointer; }
.dashboard { display:flex; gap:20px; margin-bottom:20px; }
.box { padding:10px; background:#fff; border-radius:10px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>🏨 Aryan Dormitory Manager</h2>

<button onclick="login()">Login</button>
<p id="userStatus">Not logged in</p>

<div class="dashboard">
<div class="box">Revenue: ₹<span id="rev">0</span></div>
<div class="box">Pending: ₹<span id="pend">0</span></div>
<div class="box">Guests: <span id="count">0</span></div>
</div>

<canvas id="chart" height="100"></canvas>

<div class="card">

<select id="room"></select>
<select id="bed"></select>

<input id="name" placeholder="Guest Name">
<input id="days" type="number" placeholder="Days">
<input id="price" type="number" placeholder="Bed Price">

<button onclick="openFood()">🍽️ Food</button>

<select id="payment">
<option>Pending</option>
<option>Paid</option>
</select>

<button onclick="saveBooking()">Save</button>

</div>
<div class="card">
<h3>Bed Layout</h3>
<div id="bedLayout"></div>
</div>
  
<div class="card">
<table border="1" width="100%">
<tr>
<th>Name</th><th>Room</th><th>Bed</th>
<th>Total</th><th>Status</th><th>Actions</th>
</tr>
<tbody id="table"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpJ5HP-qFwibkXs6vk-B7ewTesh8KTjCE",
  authDomain: "aryan-dormitory-manager.firebaseapp.com",
  projectId: "aryan-dormitory-manager",
  storageBucket: "aryan-dormitory-manager.appspot.com",
  messagingSenderId: "875819401826",
  appId: "1:875819401826:web:98cb2ccb87352831d4073b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();
const auth = getAuth();

let currentUser = null;

// LOGIN
window.login = async ()=>{
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

// AUTH STATE
onAuthStateChanged(auth,(user)=>{
  if(user){
    currentUser = user;
    userStatus.innerText = "Logged in: " + user.email;
  }else{
    currentUser = null;
    userStatus.innerText = "Not logged in";
  }
});

// ROOMS
const rooms={
  "अभिज्ञान‍ः":4,"व्यासः":4,"अत्रिः":4,"भृगुः":4,
  "वसिष्ठंः":12,"विश्वामित्रः":12,
  "भारद्वाजः":12,"भार्गवः":12,"आगतस्यः":12
};

for(let r in rooms){
  let o=document.createElement("option");
  o.value=r;o.innerText=r;
  room.appendChild(o);
}

room.onchange=loadBeds;

async function loadBeds(){
  bed.innerHTML="";
  let data=await getDocs(collection(db,"bookings"));
  let booked=[];
  data.forEach(d=>booked.push(d.data().room+"-"+d.data().bed));

  for(let i=1;i<=rooms[room.value];i++){
    let key=room.value+"-"+i;
    if(!booked.includes(key)){
      let o=document.createElement("option");
      o.value=i;o.innerText="Bed "+i;
      bed.appendChild(o);
    }
  }
}
loadBeds();

// FOOD
let foodItems=[];
window.openFood=()=>{
  let n=prompt("Food item");
  let p=Number(prompt("Price"));
  if(n&&p)foodItems.push({name:n,price:p});
};

// EDIT
let editId=null;

window.editBooking=async(id)=>{
  editId=id;
  let snap=await getDoc(doc(db,"bookings",id));
  let b=snap.data();

  name.value=b.name;
  room.value=b.room;
  await loadBeds();
  bed.value=b.bed;
  payment.value=b.status;
  foodItems=b.food||[];
};

// SAVE
window.saveBooking = async () => {

  if(!currentUser){
    alert("Login first ❗");
    return;
  }

  let guestName = document.getElementById("name").value || "No Name";
  let roomVal = room.value || "";
  let bedVal = bed.value || "";

  let daysVal = Number(days.value) || 0;
  let priceVal = Number(price.value) || 0;

  let foodTotal = foodItems.reduce((s,f)=>s+f.price,0);
  let total = (daysVal * priceVal) + foodTotal;

  let statusVal = payment.value || "Pending";

  if(editId){
    await updateDoc(doc(db,"bookings",editId),{
      name: guestName,
      room: roomVal,
      bed: bedVal,
      total,
      status: statusVal,
      food: foodItems || []
    });
    editId = null;
  }else{
    await addDoc(collection(db,"bookings"),{
      name: guestName,
      room: roomVal,
      bed: bedVal,
      total,
      status: statusVal,
      food: foodItems || []
    });
  }

  alert("Saved successfully ✅");

  foodItems = [];
  loadData();
  loadBeds();
};

// DELETE
window.deleteBooking=async(id)=>{
  await deleteDoc(doc(db,"bookings",id));
  loadData(); loadBeds();
};

// CHECKOUT
window.checkout=async(id)=>{
  await updateDoc(doc(db,"bookings",id),{status:"CheckedOut"});
  loadData(); loadBeds();
};

// PDF
window.invoice=(b)=>{
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text(`Invoice\n${b.name}\n${b.room} Bed ${b.bed}\n₹${b.total}`,10,10);
doc.save("invoice.pdf");
};

// CHART
let chart;
function drawChart(rev,pend){
if(chart) chart.destroy();
chart=new Chart(chartCanvas,{
type:'bar',
data:{labels:['Revenue','Pending'],datasets:[{data:[rev,pend]}]}
});
}

// LOAD
async function loadData(){
let data=await getDocs(collection(db,"bookings"));
table.innerHTML="";
let rev=0,pend=0,count=0;

data.forEach(d=>{
let b=d.data();
rev+=b.total;
if(b.status!="Paid") pend+=b.total;
count++;

table.innerHTML+=`
<tr>
<td>${b.name}</td>
<td>${b.room}</td>
<td>${b.bed}</td>
<td>₹${b.total}</td>
<td>${b.status}</td>
<td>
<button onclick='editBooking("${d.id}")'>Edit</button>
<button onclick='deleteBooking("${d.id}")'>Delete</button>
<button onclick='checkout("${d.id}")'>Checkout</button>
<button onclick='invoice(${JSON.stringify(b)})'>PDF</button>
</td>
</tr>`;
});

rev.innerText=rev;
pend.innerText=pend;
count.innerText=count;

drawChart(rev,pend);
}

let selectedRoom = null;
let selectedBed = null;

async function renderBeds(){

  let container = document.getElementById("bedLayout");
  container.innerHTML = "";

  let data = await getDocs(collection(db,"bookings"));
  let booked = [];

  data.forEach(d=>{
    let b = d.data();
    booked.push(b.room + "-" + b.bed);
  });

  for(let roomName in rooms){

    let roomDiv = document.createElement("div");
    roomDiv.innerHTML = `<h4>${roomName}</h4>`;

    for(let i=1;i<=rooms[roomName];i++){

      let key = roomName+"-"+i;
      let div = document.createElement("span");

      div.classList.add("bed");

      if(booked.includes(key)){
        div.classList.add("booked");
        div.innerText = "Bed " + i;
      }else{
        div.classList.add("available");
        div.innerText = "Bed " + i;

        div.onclick = ()=>{
          selectedRoom = roomName;
          selectedBed = i;

          document.getElementById("room").value = roomName;
          document.getElementById("bed").value = i;

          renderBeds();
        };
      }

      if(selectedRoom===roomName && selectedBed==i){
        div.classList.remove("available");
        div.classList.add("selected");
      }

      roomDiv.appendChild(div);
    }

    container.appendChild(roomDiv);
  }
}
loadData();
</script>

</body>
</html>
