<!DOCTYPE html>
<html>
<head>
<title>Aryan Dormitory Manager</title>

<style>
body { font-family: Arial; background:#f5f7fa; padding:20px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:20px; }
input, select { margin:5px; padding:6px; }
button { padding:6px 10px; margin:5px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h2>🏨 Aryan Dormitory Manager</h2>

<button onclick="login()">Login</button>
<p id="userStatus">Not logged in</p>

<div class="card">

<select id="room"></select>
<select id="bed"></select>

<input id="name" placeholder="Guest Name">
<input id="days" type="number" placeholder="Days">
<input id="price" type="number" placeholder="Bed Price">

<button onclick="saveBooking()">Save</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCpJ5HP-qFwibkXs6vk-B7ewTesh8KTjCE",
  authDomain: "aryan-dormitory-manager.firebaseapp.com",
  projectId: "aryan-dormitory-manager"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore();
const auth = getAuth();

let currentUser = null;

// LOGIN
window.login = async ()=>{
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

// AUTH STATE
onAuthStateChanged(auth,(user)=>{
  if(user){
    currentUser = user;
    document.getElementById("userStatus").innerText =
      "Logged in: " + user.email;
  }else{
    currentUser = null;
    document.getElementById("userStatus").innerText =
      "Not logged in";
  }
});

// SAVE (FIXED)
window.saveBooking = async ()=>{

  if(!currentUser){
    alert("Please login first ❗");
    return;
  }

  let name = document.getElementById("name").value;
  let days = Number(document.getElementById("days").value);
  let price = Number(document.getElementById("price").value);

  let total = days * price;

  await addDoc(collection(db,"bookings"),{
    name,
    total,
    createdBy: currentUser.email
  });

  alert("Saved successfully ✅");
};

</script>

</body>
</html>
